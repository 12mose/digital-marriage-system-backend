<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Marriage System - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #4a5568;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #4a5568;
            margin-bottom: 10px;
        }

        .stat-label {
            font-size: 1.1em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .action-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .action-card:hover {
            transform: translateY(-3px);
        }

        .action-card h3 {
            color: #4a5568;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(45deg, #5a67d8, #667eea);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(45deg, #11998e, #38ef7d);
            color: white;
        }

        .btn-success:hover {
            background: linear-gradient(45deg, #0f9d58, #11998e);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);
        }

        .btn-info {
            background: linear-gradient(45deg, #0093E9, #80D0C7);
            color: white;
        }

        .btn-info:hover {
            background: linear-gradient(45deg, #0077B6, #0093E9);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 147, 233, 0.4);
        }

        .data-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .data-section h2 {
            color: #4a5568;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        th {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        tr:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
        }

        .status-pending {
            background: #f39c12;
            color: white;
        }

        .status-approved {
            background: #38ef7d;
            color: white;
        }

        .status-active {
            background: #0093E9;
            color: white;
        }

        .refresh-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .stats-grid,
            .actions-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💍 Digital Marriage System</h1>
            <p>Core API Development Dashboard - Real-time System Overview</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalUsers">0</div>
                <div class="stat-label">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalApplications">0</div>
                <div class="stat-label">Applications</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalMarriages">0</div>
                <div class="stat-label">Marriages</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalCertificates">0</div>
                <div class="stat-label">Certificates</div>
            </div>
        </div>

        <div class="actions-grid">
            <div class="action-card">
                <h3>👥 User Management</h3>
                <button class="btn btn-primary" onclick="loadUsers()">View All Users</button>
                <button class="btn btn-success" onclick="showCreateUserForm()">Create New User</button>
                <button class="btn btn-info" onclick="refreshUsers()">Refresh</button>
            </div>
            <div class="action-card">
                <h3>📋 Application Management</h3>
                <button class="btn btn-primary" onclick="loadApplications()">View Applications</button>
                <button class="btn btn-success" onclick="showCreateApplicationForm()">New Application</button>
                <button class="btn btn-info" onclick="refreshApplications()">Refresh</button>
            </div>
            <div class="action-card">
                <h3>💍 Marriage Management</h3>
                <button class="btn btn-primary" onclick="loadMarriages()">View Marriages</button>
                <button class="btn btn-success" onclick="showCreateMarriageForm()">New Marriage</button>
                <button class="btn btn-info" onclick="refreshMarriages()">Refresh</button>
            </div>
            <div class="action-card">
                <h3>📜 Certificate Management</h3>
                <button class="btn btn-primary" onclick="loadCertificates()">View Certificates</button>
                <button class="btn btn-success" onclick="showCreateCertificateForm()">New Certificate</button>
                <button class="btn btn-info" onclick="refreshCertificates()">Refresh</button>
            </div>
        </div>

        <div class="data-section" id="dataSection" style="display: none;">
            <h2 id="sectionTitle">Data Overview</h2>
            <div class="table-container">
                <table id="dataTable">
                    <thead id="tableHead">
                    <tr></tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <button class="btn btn-primary refresh-btn" onclick="refreshAllData()">🔄 Refresh All</button>

    <script>
        const API_BASE = 'http://localhost:8081/api';

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            refreshAllData();
            // Auto-refresh every 30 seconds
            setInterval(refreshAllData, 30000);
        });

        // API call functions
        async function apiCall(endpoint, options = {}) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    headers: {
                        'Content-Type': 'application/json',
                        ...options.headers
                    },
                    ...options
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                return await response.json();
            } catch (error) {
                console.error('API call failed:', error);
                showNotification('Error connecting to server', 'error');
                return null;
            }
        }

        // Data loading functions
        async function refreshAllData() {
            await Promise.all([
                refreshUsers(),
                refreshApplications(),
                refreshMarriages(),
                refreshCertificates()
            ]);
        }

        async function refreshUsers() {
            const users = await apiCall('/users');
            document.getElementById('totalUsers').textContent = users ? users.length : 0;
            return users;
        }

        async function refreshApplications() {
            const applications = await apiCall('/applications');
            document.getElementById('totalApplications').textContent = applications ? applications.length : 0;
            return applications;
        }

        async function refreshMarriages() {
            const marriages = await apiCall('/marriages');
            document.getElementById('totalMarriages').textContent = marriages ? marriages.length : 0;
            return marriages;
        }

        async function refreshCertificates() {
            const certificates = await apiCall('/certificates');
            document.getElementById('totalCertificates').textContent = certificates ? certificates.length : 0;
            return certificates;
        }

        // Display functions
        async function loadUsers() {
            const users = await refreshUsers();
            displayData('Users', users, ['userId', 'firstName', 'lastName', 'email', 'role', 'nationalId']);
        }

        async function loadApplications() {
            const applications = await refreshApplications();
            displayData('Marriage Applications', applications, ['applicationId', 'applicant1Id', 'applicant2Id', 'submissionDate', 'applicationStatus']);
        }

        async function loadMarriages() {
            const marriages = await refreshMarriages();
            displayData('Marriages', marriages, ['marriageId', 'applicant1Id', 'applicant2Id', 'marriageDate', 'marriageLocation', 'marriageStatus', 'officiant']);
        }

        async function loadCertificates() {
            const certificates = await refreshCertificates();
            displayData('Certificates', certificates, ['certificateId', 'certificateNumber', 'issueDate', 'marriageId']);
        }

        function displayData(title, data, columns) {
            const dataSection = document.getElementById('dataSection');
            const sectionTitle = document.getElementById('sectionTitle');
            const tableHead = document.getElementById('tableHead');
            const tableBody = document.getElementById('tableBody');

            sectionTitle.textContent = title;
            
            // Clear table
            tableHead.innerHTML = '';
            tableBody.innerHTML = '';

            // Create header
            const headerRow = document.createElement('tr');
            columns.forEach(column => {
                const th = document.createElement('th');
                th.textContent = formatColumnName(column);
                headerRow.appendChild(th);
            });
            tableHead.appendChild(headerRow);

            // Populate table
            data.forEach(item => {
                const row = document.createElement('tr');
                columns.forEach(column => {
                    const td = document.createElement('td');
                    const value = item[column];
                    
                    if (column.includes('Status') || column.includes('Date')) {
                        if (column.includes('Status')) {
                            const badge = document.createElement('span');
                            badge.className = `status-badge status-${value.toLowerCase()}`;
                            badge.textContent = value;
                            td.appendChild(badge);
                        } else if (column.includes('Date')) {
                            td.textContent = new Date(value).toLocaleString();
                        }
                    } else {
                        td.textContent = value;
                    }
                    
                    row.appendChild(td);
                });
                tableBody.appendChild(row);
            });

            dataSection.style.display = 'block';
        }

        function formatColumnName(column) {
            const names = {
                'userId': 'User ID',
                'firstName': 'First Name',
                'lastName': 'Last Name',
                'email': 'Email',
                'role': 'Role',
                'nationalId': 'National ID',
                'applicationId': 'Application ID',
                'applicant1Id': 'Applicant 1 ID',
                'applicant2Id': 'Applicant 2 ID',
                'submissionDate': 'Submission Date',
                'applicationStatus': 'Status',
                'marriageId': 'Marriage ID',
                'marriageDate': 'Marriage Date',
                'marriageLocation': 'Location',
                'marriageStatus': 'Status',
                'officiant': 'Officiant',
                'certificateId': 'Certificate ID',
                'certificateNumber': 'Certificate Number',
                'issueDate': 'Issue Date'
            };
            return names[column] || column;
        }

        // Create form functions (simplified for demo)
        function showCreateUserForm() {
            const userData = {
                firstName: prompt('First Name:'),
                lastName: prompt('Last Name:'),
                email: prompt('Email:'),
                role: prompt('Role (USER/ADMIN):'),
                nationalId: prompt('National ID:')
            };
            
            if (userData.firstName && userData.lastName && userData.email) {
                createUser(userData);
            }
        }

        function showCreateApplicationForm() {
            const applicationData = {
                applicant1Id: prompt('Applicant 1 ID:'),
                applicant2Id: prompt('Applicant 2 ID:')
            };
            
            if (applicationData.applicant1Id && applicationData.applicant2Id) {
                createApplication(applicationData);
            }
        }

        function showCreateMarriageForm() {
            const marriageData = {
                applicant1Id: prompt('Applicant 1 ID:'),
                applicant2Id: prompt('Applicant 2 ID:'),
                marriageDate: prompt('Marriage Date (YYYY-MM-DD):'),
                marriageLocation: prompt('Marriage Location:'),
                officiant: prompt('Officiant:')
            };
            
            if (marriageData.applicant1Id && marriageData.applicant2Id) {
                createMarriage(marriageData);
            }
        }

        function showCreateCertificateForm() {
            const certificateData = {
                marriageId: prompt('Marriage ID:')
            };
            
            if (certificateData.marriageId) {
                createCertificate(certificateData);
            }
        }

        // Create functions
        async function createUser(userData) {
            const result = await apiCall('/users', {
                method: 'POST',
                body: JSON.stringify(userData)
            });
            
            if (result) {
                showNotification('User created successfully!', 'success');
                refreshAllData();
            }
        }

        async function createApplication(applicationData) {
            const result = await apiCall('/applications', {
                method: 'POST',
                body: JSON.stringify(applicationData)
            });
            
            if (result) {
                showNotification('Application created successfully!', 'success');
                refreshAllData();
            }
        }

        async function createMarriage(marriageData) {
            const result = await apiCall('/marriages', {
                method: 'POST',
                body: JSON.stringify(marriageData)
            });
            
            if (result) {
                showNotification('Marriage created successfully!', 'success');
                refreshAllData();
            }
        }

        async function createCertificate(certificateData) {
            const result = await apiCall('/certificates', {
                method: 'POST',
                body: JSON.stringify(certificateData)
            });
            
            if (result) {
                showNotification('Certificate created successfully!', 'success');
                refreshAllData();
            }
        }

        // Notification system
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: ${type === 'success' ? '#38ef7d' : '#f39c12'};
                color: white;
                padding: 15px 25px;
                border-radius: 8px;
                z-index: 10000;
                font-weight: 600;
                box-shadow: 0 4px 15px rgba(0,0,0,0.2);
                animation: slideDown 0.3s ease;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideUp 0.3s ease';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }

        // Add animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideDown {
                from { transform: translate(-50%, -100%); opacity: 0; }
                to { transform: translate(-50%, 0); opacity: 1; }
            }
            @keyframes slideUp {
                from { transform: translate(-50%, 0); opacity: 1; }
                to { transform: translate(-50%, -100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
