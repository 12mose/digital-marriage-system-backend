<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Marriage System - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
            min-height: 100vh;
            color: var(--text-main);
            padding: 20px;
        }

        .container { max-width: 1280px; margin: 0 auto; }

        /* Login Overlay */
        #loginOverlay {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex; align-items: center; justify-content: center;
        }

        .login-card {
            background: white; padding: 40px; border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            width: 100%; max-width: 400px;
        }

        /* Header */
        .header {
            background: var(--card-bg); backdrop-filter: blur(12px);
            padding: 32px; border-radius: 24px; margin-bottom: 32px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .header-info h1 { font-size: 1.875rem; font-weight: 700; color: #0f172a; margin-bottom: 4px; }

        /* Stats */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px; margin-bottom: 32px;
        }

        .stat-card {
            background: white; padding: 24px; border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .stat-card:hover { transform: translateY(-4px); }

        .stat-value { font-size: 2.25rem; font-weight: 700; color: var(--primary); }

        /* Content Areas */
        .grid-layout { display: grid; grid-template-columns: 300px 1fr; gap: 32px; }

        .sidebar { display: flex; flex-direction: column; gap: 16px; }

        .nav-card {
            background: white; padding: 24px; border-radius: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .nav-btn {
            width: 100%; padding: 12px 16px; margin-bottom: 8px;
            border: none; border-radius: 12px; background: transparent;
            color: var(--text-muted); text-align: left; cursor: pointer;
            font-weight: 600; transition: all 0.2s;
            display: flex; align-items: center; gap: 12px;
        }

        .nav-btn:hover, .nav-btn.active {
            background: #f1f5f9; color: var(--primary);
        }

        /* Main View */
        .main-content {
            background: white; padding: 32px; border-radius: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            min-height: 600px; position: relative;
        }

        /* Tables */
        table { width: 100%; border-collapse: separate; border-spacing: 0; }

        th {
            background: #f8fafc; padding: 16px; text-align: left; font-size: 0.75rem;
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
            color: var(--text-muted); border-bottom: 1px solid #e2e8f0;
        }

        td { padding: 16px; border-bottom: 1px solid #f1f5f9; font-size: 0.875rem; }

        .badge { padding: 4px 12px; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; }

        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-approved { background: #d1fae5; color: #065f46; }
        .badge-active { background: #dbeafe; color: #1e40af; }

        /* Actions */
        .btn {
            padding: 8px 16px; border-radius: 8px; font-weight: 600;
            cursor: pointer; border: none; transition: 0.2s;
        }

        .btn-sm { font-size: 0.75rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }

        input, select, textarea {
            width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 16px;
        }

        .hidden { display: none !important; }

        /* Chat Styles */
        .chat-container { display: flex; flex-direction: column; height: 500px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 16px; background: #f8fafc; border-radius: 12px; margin-bottom: 16px; border: 1px solid #e2e8f0; }
        .message-bubble { margin-bottom: 12px; padding: 12px 16px; border-radius: 12px; max-width: 80%; line-height: 1.5; }
        .msg-sent { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-received { background: #e2e8f0; color: var(--text-main); align-self: flex-start; border-bottom-left-radius: 2px; }
        .chat-input-area { display: flex; gap: 12px; }
        .chat-input-area textarea { margin-bottom: 0; resize: none; height: 44px; }
    </style>
</head>
<body>
    <div id="loginOverlay">
        <div class="login-card" id="loginFormCard">
            <h2 style="margin-bottom: 24px; text-align: center;">Welcome Back</h2>
            <form id="loginForm">
                <label>Email</label>
                <input type="email" id="loginEmail" value="admin@dms.com" required>
                <label>Password</label>
                <input type="password" id="loginPass" value="admin123" required>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Sign In</button>
            </form>
            <p style="text-align: center; margin-top: 16px; color: var(--text-muted); font-size: 0.875rem;">
                Don't have an account? <a href="#" onclick="toggleAuth('register')">Register Now</a>
            </p>
        </div>

        <div class="login-card hidden" id="registerFormCard">
            <h2 style="margin-bottom: 24px; text-align: center;">Join Us</h2>
            <form id="registerForm">
                <label>First Name</label>
                <input type="text" id="regFirst" required>
                <label>Last Name</label>
                <input type="text" id="regLast" required>
                <label>Email</label>
                <input type="email" id="regEmail" required>
                <label>National ID</label>
                <input type="text" id="regNationalId" required>
                <label>Password</label>
                <input type="password" id="regPass" placeholder="Password" required>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
            </form>
            <p style="text-align: center; margin-top: 16px; color: var(--text-muted); font-size: 0.875rem;">
                Already have an account? <a href="#" onclick="toggleAuth('login')">Sign In</a>
            </p>
        </div>
    </div>

    <div class="container hidden" id="dashboard">
        <header class="header">
            <div class="header-info">
                <h1>💍 Digital Marriage System</h1>
                <p style="color: var(--text-muted)">Welcome, <span id="userDisplay">...</span> (<span id="roleDisplay">...</span>)</p>
            </div>
            <div class="header-actions">
                <button class="btn" onclick="logout()" style="background: #f1f5f9;">Sign Out</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <p style="color: var(--text-muted); font-size: 0.875rem;">Users</p>
                <div class="stat-value" id="statUsers">0</div>
            </div>
            <div class="stat-card">
                <p style="color: var(--text-muted); font-size: 0.875rem;">Pending Apps</p>
                <div class="stat-value" id="statPending">0</div>
            </div>
            <div class="stat-card">
                <p style="color: var(--text-muted); font-size: 0.875rem;">Marriages</p>
                <div class="stat-value" id="statMarriages">0</div>
            </div>
            <div class="stat-card">
                <p style="color: var(--text-muted); font-size: 0.875rem;">Certificates</p>
                <div class="stat-value" id="statCertificates">0</div>
            </div>
        </div>

        <div class="grid-layout">
            <aside class="sidebar">
                <div class="nav-card">
                    <button id="navApps" class="nav-btn active" onclick="setView('applications')">📋 Applications</button>
                    <button id="navMarriages" class="nav-btn" onclick="setView('marriages')">💍 Marriages</button>
                    <button id="navCerts" class="nav-btn" onclick="setView('certificates')">📜 Certificates</button>
                    <button id="navUsers" class="nav-btn" onclick="setView('users')">👥 User Directory</button>
                    <button id="navChat" class="nav-btn" onclick="setView('chat')">💬 Messages</button>
                    <button id="navLogs" class="nav-btn" onclick="setView('auditlogs')">🛡️ Audit Logs</button>
                </div>
            </aside>

            <main class="main-content">
                <div id="viewHeader" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h2 id="viewTitle">Marriage Applications</h2>
                    <div id="viewActions">
                        <select id="statusFilter" style="width: auto; margin-bottom: 0;" onchange="refreshView()">
                            <option value="">All Statuses</option>
                            <option value="PENDING">Pending</option>
                            <option value="APPROVED">Approved</option>
                            <option value="REJECTED">Rejected</option>
                        </select>
                        <button class="btn btn-primary" onclick="showCreateModal()">New Record</button>
                    </div>
                </div>

                <div id="tableContainer">
                    <table id="mainTable">
                        <thead><tr id="tableHead"></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>

                <!-- Chat View -->
                <div id="chatView" class="hidden">
                    <div class="chat-container">
                        <div id="chatRecipientInfo" style="margin-bottom: 16px; font-weight: 600; color: var(--primary);">
                            Chatting with: <span id="recipientEmailDisplay">Select a user</span>
                        </div>
                        <div id="chatMessages" class="chat-messages" style="display: flex; flex-direction: column;"></div>
                        <div class="chat-input-area">
                            <textarea id="chatInput" placeholder="Type your message..."></textarea>
                            <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8081/api';
        let currentUser = null;
        let currentView = 'applications';
        let token = localStorage.getItem('jwt');
        let selectedRecipient = 'officer@dms.com'; // Default for Citizens

        document.addEventListener('DOMContentLoaded', () => {
            const storedUser = localStorage.getItem('user');
            if (token && storedUser) {
                currentUser = JSON.parse(storedUser);
                showDashboard();
            }
        });

        function toggleAuth(view) {
            document.getElementById('loginFormCard').classList.toggle('hidden', view === 'register');
            document.getElementById('registerFormCard').classList.toggle('hidden', view !== 'register');
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userData = {
                firstName: document.getElementById('regFirst').value,
                lastName: document.getElementById('regLast').value,
                email: document.getElementById('regEmail').value,
                nationalId: document.getElementById('regNationalId').value,
                password: document.getElementById('regPass').value,
                role: 'CITIZEN'
            };
            try {
                const res = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                if (res.ok) {
                    alert('Registration successful! Please verify your email.');
                    toggleAuth('login');
                } else { alert('Failed: ' + await res.text()); }
            } catch (err) { alert('Connection error'); }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPass').value;
            try {
                const res = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                if (res.ok) {
                    const data = await res.json();
                    currentUser = data; token = data.token;
                    localStorage.setItem('jwt', token);
                    localStorage.setItem('user', JSON.stringify(data));
                    showDashboard();
                } else if (res.status === 403) alert(await res.text());
                else alert('Invalid credentials');
            } catch (err) { alert('Connection error'); }
        });

        function showDashboard() {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('userDisplay').innerText = currentUser.email;
            document.getElementById('roleDisplay').innerText = currentUser.role;

            const role = currentUser.role.toUpperCase();
            document.getElementById('navUsers').classList.toggle('hidden', role !== 'ADMIN');
            document.getElementById('navLogs').classList.toggle('hidden', role !== 'ADMIN');
            document.getElementById('navMarriages').classList.toggle('hidden', role === 'CITIZEN');
            
            if (role === 'CITIZEN') selectedRecipient = 'officer@dms.com';
            
            refreshAllData();
            refreshView();
        }

        function logout() { localStorage.clear(); location.reload(); }

        async function fetchAPI(endpoint, options = {}) {
            const res = await fetch(`${API_BASE}${endpoint}`, {
                ...options,
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', ...options.headers }
            });
            if (res.status === 403) logout();
            return res.ok ? await res.json() : null;
        }

        async function refreshAllData() {
            const role = (currentUser && currentUser.role) ? currentUser.role.toUpperCase() : '';
            
            // Citizens cannot fetch all users or certificates
            const calls = [fetchAPI('/applications')];
            if (role !== 'CITIZEN') {
                calls.push(fetchAPI('/users'), fetchAPI('/marriages'), fetchAPI('/certificates'));
            } else {
                calls.push(Promise.resolve([]), fetchAPI('/marriages'), Promise.resolve([]));
            }

            const [apps, users, marriages, certs] = await Promise.all(calls);
            
            document.getElementById('statUsers').innerText = users?.length || 0;
            document.getElementById('statPending').innerText = apps?.filter(a => a.applicationStatus === 'PENDING').length || 0;
            document.getElementById('statMarriages').innerText = marriages?.filter(m => m.marriageStatus === 'ACTIVE').length || 0;
            document.getElementById('statCertificates').innerText = certs?.length || 0;
        }

        function setView(view) {
            currentView = view;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`nav${view.charAt(0).toUpperCase() + view.slice(1,4)}`).classList.add('active');
            
            document.getElementById('tableContainer').classList.toggle('hidden', view === 'chat');
            document.getElementById('chatView').classList.toggle('hidden', view !== 'chat');
            document.getElementById('viewActions').classList.toggle('hidden', view === 'chat');

            const titles = { applications: 'Applications', marriages: 'Marriages', certificates: 'Certificates', users: 'Users', auditlogs: 'Audit Logs', chat: 'Chat Messenger' };
            document.getElementById('viewTitle').innerText = titles[view];
            
            if (view === 'chat') {
                document.getElementById('recipientEmailDisplay').innerText = selectedRecipient;
                loadMessages();
            } else {
                refreshView();
            }
        }

        async function refreshView() {
            const filter = document.getElementById('statusFilter').value;
            let endpoint = `/${currentView}${filter ? '?status=' + filter : ''}`;
            const data = await fetchAPI(endpoint);
            renderTable(data);
        }

        function renderTable(data) {
            const head = document.getElementById('tableHead');
            const body = document.getElementById('tableBody');
            head.innerHTML = ''; body.innerHTML = '';
            if (!data || data.length === 0) {
                body.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:40px;">No records</td></tr>';
                return;
            }
            const cols = Object.keys(data[0]);
            cols.forEach(c => { const th = document.createElement('th'); th.innerText = c; head.appendChild(th); });
            
            const role = currentUser.role.toUpperCase();
            data.forEach(row => {
                const tr = document.createElement('tr');
                cols.forEach(c => {
                    const td = document.createElement('td');
                    if (c.toLowerCase().includes('status')) td.innerHTML = `<span class="badge badge-${row[c].toLowerCase()}">${row[c]}</span>`;
                    else td.innerText = row[c];
                    tr.appendChild(td);
                });
                
                // Admin Actions in User list
                if (currentView === 'users' && row.email !== currentUser.email && role === 'ADMIN') {
                    const td = document.createElement('td');
                    td.style.display = 'flex'; td.style.gap = '8px';
                    
                    if (row.role === 'CITIZEN') {
                        td.innerHTML += `<button class="btn btn-sm btn-success" onclick="promoteUser(${row.userId}, 'OFFICER')">Promote to Officer</button>`;
                    } else if (row.role === 'OFFICER') {
                        td.innerHTML += `<button class="btn btn-sm btn-primary" style="background:#581c87" onclick="promoteUser(${row.userId}, 'ADMIN')">Promote to Admin</button>`;
                    }
                    
                    td.innerHTML += `<button class="btn btn-sm btn-primary" onclick="startChat('${row.email}')">Chat</button>`;
                    tr.appendChild(td);
                }

                if (currentView === 'applications' && row.applicationStatus === 'PENDING' && role !== 'CITIZEN') {
                    const td = document.createElement('td');
                    td.innerHTML = `<button class="btn btn-success btn-sm" onclick="approveApplication(${row.applicationId})">Approve</button>`;
                    tr.appendChild(td);
                }
                body.appendChild(tr);
            });
        }

        function startChat(email) {
            selectedRecipient = email;
            setView('chat');
        }

        async function loadMessages() {
            const messages = await fetchAPI(`/messages/conversation/${selectedRecipient}`);
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';
            messages?.forEach(m => {
                const div = document.createElement('div');
                div.className = `message-bubble ${m.senderEmail === currentUser.email ? 'msg-sent' : 'msg-received'}`;
                div.innerText = m.content;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const content = document.getElementById('chatInput').value;
            if (!content) return;
            const res = await fetchAPI('/messages', {
                method: 'POST',
                body: JSON.stringify({ receiverEmail: selectedRecipient, content })
            });
            if (res) {
                document.getElementById('chatInput').value = '';
                loadMessages();
            }
        }

        async function promoteUser(id, newRole) {
            if (!confirm(`Are you sure you want to promote this user to ${newRole}?`)) return;
            const res = await fetchAPI(`/users/${id}/role`, {
                method: 'PUT',
                body: JSON.stringify({ role: newRole })
            });
            if (res) {
                alert('User promoted successfully!');
                refreshView();
            }
        }

        async function approveApplication(id) {
            if (!confirm('Approve?')) return;
            const res = await fetch(`${API_BASE}/applications/${id}/status`, {
                method: 'PUT', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: "APPROVED" })
            });
            if (res.ok) { refreshAllData(); refreshView(); }
        }

        function showCreateModal() {
            const a1 = prompt('Applicant 1 ID:'), a2 = prompt('Applicant 2 ID:');
            if (a1 && a2) fetchAPI('/applications', { method: 'POST', body: JSON.stringify({ applicant1Id: a1, applicant2Id: a2 }) }).then(refreshAllData);
        }
        
        // Auto-refresh chat
        setInterval(() => { if (currentView === 'chat') loadMessages(); }, 5000);
    </script>
</body>
</html>
